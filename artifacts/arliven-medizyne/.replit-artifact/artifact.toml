kind = "web"
previewPath = "/"
title = "Arliven Medizyne"
version = "1.0.0"
id = "artifacts/arliven-medizyne"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23214

[services.development]
run = "pnpm --filter @workspace/arliven-medizyne run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arliven-medizyne", "run", "build" ]
publicDir = "artifacts/arliven-medizyne/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23214"
BASE_PATH = "/"
