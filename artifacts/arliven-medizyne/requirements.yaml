  - path: "artifacts/arliven-medizyne/public/images/hero-bg-1.png"
    description: "Abstract, premium clean light blue and white gradient background with subtle high-tech pharmaceutical molecular geometric patterns, very soft and professional."
    aspect_ratio: "16:9"
  - path: "artifacts/arliven-medizyne/public/images/hero-bg-2.png"
    description: "Abstract soft focus laboratory or global logistics connection nodes in light teal and white, premium corporate aesthetic, shallow depth of field."
    aspect_ratio: "16:9"
  - path: "artifacts/arliven-medizyne/public/images/hero-bg-3.png"
